services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - AGENTQA_DOCKER_EXEC=0
      - AGENTQA_ENABLE_MUTATION=1
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - ./backend/reports:/app/backend/reports
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_BASE=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
